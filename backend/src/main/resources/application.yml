server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: hospital-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/hospital;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    # Override in production via APP_JWT_SECRET (min 32 chars for HS256)
    secret: ${APP_JWT_SECRET:change-me-hospital-jwt-secret-key-32chars-min}
    expire-hours: ${APP_JWT_EXPIRE_HOURS:72}
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hospital: INFO
