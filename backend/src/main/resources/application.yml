server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: hospital-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/hospital;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  demo-data:
    enabled: ${APP_DEMO_DATA_ENABLED:true}
  jwt:
    # Development gets an ephemeral secret on each start; production must set APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:${random.uuid}${random.uuid}}
    expire-hours: ${APP_JWT_EXPIRE_HOURS:72}
  auth:
    cookie-name: ${APP_AUTH_COOKIE_NAME:hospital_session}
    cookie-secure: ${APP_COOKIE_SECURE:false}
    cookie-same-site: ${APP_COOKIE_SAME_SITE:Lax}
    cookie-max-age-seconds: ${APP_COOKIE_MAX_AGE_SECONDS:259200}
    max-login-failures: ${APP_MAX_LOGIN_FAILURES:5}
    login-failure-window-minutes: ${APP_LOGIN_FAILURE_WINDOW_MINUTES:15}
    max-tracked-usernames: ${APP_MAX_TRACKED_USERNAMES:10000}
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hospital: INFO
