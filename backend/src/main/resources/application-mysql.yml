spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hospital?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql-tables.sql
      encoding: UTF-8
      continue-on-error: true
  h2:
    console:
      enabled: false

logging:
  level:
    com.hospital: INFO
